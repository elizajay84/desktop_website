<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit</title>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body class="form-page">

<nav>
  <div class="nav-left">
    <img src="Short%20List-2.svg" alt="Short List">
  </div>
  <div class="nav-center">
    <a href="#">Home</a>
    <a href="#">Films</a>
    <a href="#" class="current-page">Submit</a>
  </div>

  <div class="nav-right">
    <img src="Avatar.svg" alt="Avatar">
    <img src="USWDS%20Components.svg" alt="hamburger">
  </div>
</nav>

  <section class="form-container">
    <h1>Get Short Listed</h1>
    <div class="form-subtitle">Submit your film to be featured on Short List!</div>

    <form>
      <div class="form-group">
        <label for="firstname">Your First Name <span class="required">*</span></label>
        <input type="text" id="firstname" name="firstname">
      </div>
      <div class="form-group">
        <label for="lastname">Your Last Name <span class="required">*</span></label>
        <input type="text" id="lastname" name="lastname">
      </div>
      <div class="form-group">
        <label for="email">Your Email <span class="required">*</span></label>
        <input type="email" id="email" name="email">
      </div>
      <div class="form-group">
        <label for="film">Film <span class="required">*</span></label>
        <input type="text" id="film" name="film">
      </div>
      <div class="form-group">
        <label for="link">Link to Film <span class="required">*</span></label>
        <input type="url" id="link" name="link">
      </div>
      <button type="submit">Submit</button>
    </form>

  </section>
</body>
</html>
